global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: spring-services
    metrics_path: /actuator/prometheus
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: transaction-service|fraud-detection-service|alert-service
        action: keep
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: event-driven-fraud-detection
        action: keep
      - source_labels: [__meta_docker_port_private]
        regex: 8080|8081|8082
        action: keep
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: application
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        replacement: $1
        target_label: container

  - job_name: kafka-exporter
    static_configs:
      - targets:
          - kafka-exporter:9308

  - job_name: postgres-exporters
    static_configs:
      - targets:
          - transaction-db-exporter:9187
        labels:
          db_service: transaction-db
          db_name: transactions
      - targets:
          - fraud-db-exporter:9187
        labels:
          db_service: fraud-db
          db_name: fraud
      - targets:
          - alert-db-exporter:9187
        labels:
          db_service: alert-db
          db_name: alerts

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
