name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-End Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install docker-compose (compose-switch)
        run: |
          COMPOSE_SWITCH_VERSION=v1.0.5
          sudo curl -fL "https://github.com/docker/compose-switch/releases/download/${COMPOSE_SWITCH_VERSION}/docker-compose-linux-amd64" \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Pre-pull Testcontainers images
        run: |
          docker pull confluentinc/cp-zookeeper:7.6.1 &
          docker pull confluentinc/cp-kafka:7.6.1 &
          docker pull postgres:16-alpine &
          docker pull maven:3.9.9-eclipse-temurin-21 &
          docker pull eclipse-temurin:21-jre &
          docker pull alpine/socat:1.7.4.3-r0 &
          docker pull testcontainers/ryuk:0.7.0 &
          wait

      - name: Package all services (skip tests)
        run: mvn -B package -DskipTests -pl transaction-service,fraud-detection-service,alert-service

      - name: Build E2E service images upfront
        run: docker compose -f e2e-tests/docker-compose-e2e.yml build

      - name: Run E2E tests
        run: |
          for attempt in 1 2; do
            echo "E2E attempt ${attempt}/2"
            if mvn -B verify -pl e2e-tests; then
              exit 0
            fi

            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi

            docker compose -f e2e-tests/docker-compose-e2e.yml logs --tail=200 || true
            docker compose -f e2e-tests/docker-compose-e2e.yml down -v || true
          done
        timeout-minutes: 30

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: 'e2e-tests/target/failsafe-reports/'
          retention-days: 7

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          cd e2e-tests
          docker compose -f docker-compose-e2e.yml logs --tail=100 2>/dev/null || true
