name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: End-to-End Pipeline Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install docker-compose compatibility shim
        run: |
          printf '#!/bin/sh\nexec docker compose "$@"\n' | sudo tee /usr/local/bin/docker-compose > /dev/null
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Package all services (skip tests)
        run: mvn -B package -DskipTests -pl transaction-service,fraud-detection-service,alert-service

      - name: Run E2E tests
        run: mvn -B verify -pl e2e-tests
        timeout-minutes: 15

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: 'e2e-tests/target/failsafe-reports/'
          retention-days: 7

      - name: Dump Docker logs on failure
        if: failure()
        run: |
          cd e2e-tests
          docker compose -f docker-compose-e2e.yml logs --tail=100 2>/dev/null || true
