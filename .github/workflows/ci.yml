name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile all modules
        run: mvn -B clean compile -DskipTests

      - name: Run unit tests
        run: mvn -B test -pl transaction-service,fraud-detection-service,alert-service -Dtest='!*IntegrationTest'

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Pre-pull Testcontainers images
        run: |
          docker pull postgres:16-alpine &
          docker pull confluentinc/cp-kafka:7.6.1 &
          docker pull testcontainers/ryuk:0.7.0 &
          wait

      - name: Run integration tests (Testcontainers)
        run: |
          mvn -B test -pl transaction-service -Dtest='*IntegrationTest'
          mvn -B test -pl fraud-detection-service -Dtest='*IntegrationTest' -Dapp.fraud.rules.fraud-score-threshold=45
          mvn -B test -pl alert-service -Dtest='*IntegrationTest'

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
