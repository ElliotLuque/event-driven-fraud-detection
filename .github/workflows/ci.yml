name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile all modules
        run: mvn -B clean compile -DskipTests

      - name: Run unit tests
        run: mvn -B test -pl transaction-service,fraud-detection-service,alert-service -Dtest='!*IntegrationTest'

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres-transactions:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: transactions
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d transactions"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-fraud:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fraud
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d fraud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-alerts:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alerts
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5435:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d alerts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run integration tests (Testcontainers)
        run: mvn -B test -pl transaction-service,fraud-detection-service,alert-service -Dtest='*IntegrationTest'

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
